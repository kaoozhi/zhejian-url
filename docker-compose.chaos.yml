# Chaos testing overlay — use on top of docker-compose.yml
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.chaos.yml up
#
# Proxies:
#   rate-limiter  toxiproxy:50052  →  rate-limiter:50051
#   redis-1       toxiproxy:6382   →  redis-1:6379
#   redis-2       toxiproxy:6383   →  redis-2:6379
#   redis-3       toxiproxy:6384   →  redis-3:6379
#   postgres      toxiproxy:5433   →  postgres:5432
#
# Chaos commands (examples):
#   # All Redis nodes: inject 200ms latency
#   docker exec zhejian-toxiproxy /toxiproxy-cli toxic add -t latency -a latency=200 redis-1
#   docker exec zhejian-toxiproxy /toxiproxy-cli toxic add -t latency -a latency=200 redis-2
#   docker exec zhejian-toxiproxy /toxiproxy-cli toxic add -t latency -a latency=200 redis-3
#
#   # Single Redis node down (simulates node failure, CB should open for that node only)
#   docker exec zhejian-toxiproxy /toxiproxy-cli toxic add -t timeout -a timeout=0 redis-1
#
#   # Postgres: drop all connections
#   docker exec zhejian-toxiproxy /toxiproxy-cli toxic add -t timeout -a timeout=0 postgres
#
#   # Remove toxic (auto-name: latency_downstream / timeout_downstream)
#   docker exec zhejian-toxiproxy /toxiproxy-cli toxic delete -n latency_downstream redis-1

services:
  # Toxiproxy - transparent TCP proxy for chaos injection
  toxiproxy:
    image: ghcr.io/shopify/toxiproxy:2.7.0
    container_name: zhejian-toxiproxy
    ports:
      - "8474:8474"   # REST API
      - "50052:50052" # rate-limiter proxy
      - "6382:6382"   # redis-1 proxy
      - "6383:6383"   # redis-2 proxy
      - "6384:6384"   # redis-3 proxy
      - "5433:5433"   # postgres proxy

  # One-shot init: registers all proxy rules on startup
  toxiproxy-init:
    image: curlimages/curl:8.11.1
    container_name: zhejian-toxiproxy-init
    entrypoint: []
    command:
      - /bin/sh
      - -c
      - |
        until curl -sf http://toxiproxy:8474/proxies > /dev/null; do sleep 1; done
        curl -sf -X POST http://toxiproxy:8474/proxies \
          -H 'Content-Type: application/json' \
          -d '{"name":"rate-limiter","listen":"0.0.0.0:50052","upstream":"rate-limiter:50051"}'
        curl -sf -X POST http://toxiproxy:8474/proxies \
          -H 'Content-Type: application/json' \
          -d '{"name":"redis-1","listen":"0.0.0.0:6382","upstream":"redis-1:6379"}'
        curl -sf -X POST http://toxiproxy:8474/proxies \
          -H 'Content-Type: application/json' \
          -d '{"name":"redis-2","listen":"0.0.0.0:6383","upstream":"redis-2:6379"}'
        curl -sf -X POST http://toxiproxy:8474/proxies \
          -H 'Content-Type: application/json' \
          -d '{"name":"redis-3","listen":"0.0.0.0:6384","upstream":"redis-3:6379"}'
        curl -sf -X POST http://toxiproxy:8474/proxies \
          -H 'Content-Type: application/json' \
          -d '{"name":"postgres","listen":"0.0.0.0:5433","upstream":"postgres:5432"}'
        echo 'Toxiproxy configured: rate-limiter, redis-1, redis-2, redis-3, postgres'
    depends_on:
      - toxiproxy
    restart: "no"

  # Override gateway: route all dependencies through toxiproxy.
  # AMQP_URL and RATE_LIMITER_ADDR are hardcoded here so local .env overrides
  # (e.g. localhost URLs set for host-gateway load tests) don't leak in.
  gateway:
    environment:
      - RATE_LIMITER_ADDR=toxiproxy:50052
      - AMQP_URL=amqp://guest:guest@rabbitmq:5672/
      - CACHE_NODES=toxiproxy:6382,toxiproxy:6383,toxiproxy:6384
      # Tighten Redis timeouts so latency injection (200ms) reliably exceeds
      # the client deadline and triggers the circuit breaker.
      - CACHE_READ_TIMEOUT=100ms
      - CACHE_WRITE_TIMEOUT=100ms
      - DB_HOST=toxiproxy
      - DB_PORT=5433
    depends_on:
      toxiproxy-init:
        condition: service_completed_successfully
