name: Docker Compose

on:
  pull_request:
    branches: [ "main" ]
  push:
    branches: [main]

jobs:
  integration:
    runs-on: ubuntu-latest
    env:
      BASE_URL: http://localhost

    steps:
      - uses: actions/checkout@v5

      - name: Create .env file
        run: |
          cat > .env << 'EOF'
          DB_HOST=postgres
          DB_PORT=5432
          DB_USER=zhejian
          DB_PASSWORD=zhejian_secret
          DB_NAME=urlshortener
          DB_SSLMODE=disable
          CACHE_HOST=redis
          CACHE_PORT=6379
          CACHE_TTL=5
          RATE_LIMITER_ADDR=rate-limiter:50051
          RATE_LIMITER_TIMEOUT=100ms
          RATE_LIMIT=100
          BURST=50
          EOF

      - name: Start services
        uses: hoverkraft-tech/compose-action@05da55b2bb8a5a759d1c4732095044bd9018c050 # v2.4.3
        with:
            compose-file: "./docker-compose.prod.yml"
            up-flags: "-d"

      - name: Wait for services to be healthy
        run: |
          echo "Waiting for nginx/read-service..."
          for i in $(seq 1 30); do
            if curl --fail --silent $BASE_URL/health > /dev/null; then
              echo "✓ Services healthy (attempt $i)"
              break
            fi
            if [ "$i" -eq 30 ]; then
              echo "✗ Health check timed out after 60s"
              docker compose -f docker-compose.prod.yml ps
              docker compose -f docker-compose.prod.yml logs
              exit 1
            fi
            sleep 2
          done

      - name: Verify migrations
        run: |
          LOGS=$(docker compose -f docker-compose.prod.yml logs migrations)
          echo "$LOGS"

          if echo "$LOGS" | grep -q "Migrations completed!"; then
            echo "✓ Migrations completed successfully"
          else
            echo "✗ Migration failed - 'Migrations completed!' not found in logs"
            exit 1
          fi

      - name: Smoke test - health endpoint
        run: |
          RESPONSE=$(curl --fail --silent $BASE_URL/health)
          echo "$RESPONSE"
          echo "✓ Health check passed"

      - name: Smoke test - create short URL
        id: shorten
        run: |
          RESPONSE=$(curl --fail --silent \
            -X POST \
            -H "Content-Type: application/json" \
            -d '{"url": "https://example.com/ci-test"}' \
            $BASE_URL/api/v1/shorten)
          echo "$RESPONSE"
          CODE=$(echo "$RESPONSE" | jq -r '.short_code')
          if [ -z "$CODE" ] || [ "$CODE" = "null" ]; then
            echo "✗ Failed to extract short_code from response"
            exit 1
          fi
          echo "short_code=$CODE" >> "$GITHUB_OUTPUT"
          echo "✓ Short URL created: $CODE"

      - name: Smoke test - get URL metadata
        run: |
          CODE="${{ steps.shorten.outputs.short_code }}"
          RESPONSE=$(curl --fail --silent "$BASE_URL/api/v1/urls/$CODE")
          echo "$RESPONSE"
          ORIGINAL=$(echo "$RESPONSE" | jq -r '.original_url')
          if [ "$ORIGINAL" != "https://example.com/ci-test" ]; then
            echo "✗ original_url mismatch: expected 'https://example.com/ci-test', got '$ORIGINAL'"
            exit 1
          fi
          echo "✓ URL metadata correct"

      - name: Smoke test - redirect
        run: |
          CODE="${{ steps.shorten.outputs.short_code }}"
          HTTP_CODE=$(curl --silent -o /dev/null -w "%{http_code}" "$BASE_URL/$CODE")
          if [ "$HTTP_CODE" != "301" ]; then
            echo "✗ Expected 301, got $HTTP_CODE"
            exit 1
          fi
          echo "✓ Redirect returns 301"

      - name: Smoke test - analytics pipeline
        run: |
          CODE="${{ steps.shorten.outputs.short_code }}"
          # The redirect above published 1 click event to RabbitMQ.
          # The analytics-worker flushes every 5s (FLUSH_INTERVAL default).
          # Sleep 10s to ensure the ticker fires and the batch is inserted.
          echo "Waiting 10s for analytics-worker to flush..."
          sleep 10
          COUNT=$(docker compose -f docker-compose.prod.yml exec -T postgres \
            psql -U zhejian -d urlshortener -t -c \
            "SELECT COUNT(*) FROM analytics WHERE short_code='$CODE';")
          COUNT=$(echo "$COUNT" | tr -d '[:space:]')
          echo "Analytics rows for short_code=$CODE: $COUNT"
          if [ -z "$COUNT" ] || [ "$COUNT" -lt 1 ]; then
            echo "✗ No analytics row found — pipeline may be broken"
            docker compose -f docker-compose.prod.yml logs analytics-worker
            exit 1
          fi
          echo "✓ Analytics pipeline verified: $COUNT row(s) inserted"

      - name: Smoke test - analytics worker resilience (fire-and-forget)
        run: |
          CODE="${{ steps.shorten.outputs.short_code }}"
          docker compose -f docker-compose.prod.yml stop analytics-worker
          HTTP_CODE=$(curl --silent -o /dev/null -w "%{http_code}" "$BASE_URL/$CODE")
          if [ "$HTTP_CODE" != "301" ]; then
            echo "✗ read-service coupled to analytics-worker: got $HTTP_CODE, expected 301"
            exit 1
          fi
          echo "✓ read-service returns 301 even with analytics-worker down"
          docker compose -f docker-compose.prod.yml start analytics-worker

      - name: Smoke test - rate limit enforced (429)
        run: |
          # Fire rapid requests to exhaust the burst capacity (BURST=50).
          # All requests from the runner share the same IP, so the token bucket
          # drains quickly. The 51st consecutive request should be rate-limited.
          got_429=false
          for i in $(seq 1 60); do
            HTTP_CODE=$(curl --silent -o /dev/null -w "%{http_code}" $BASE_URL/health)
            if [ "$HTTP_CODE" = "429" ]; then
              got_429=true
              echo "✓ Rate limit enforced after $i requests (got 429)"
              break
            fi
          done
          if [ "$got_429" = "false" ]; then
            echo "✗ Rate limit not enforced — no 429 received in 60 requests"
            docker compose -f docker-compose.prod.yml logs rate-limiter
            exit 1
          fi

      - name: Dump logs on failure
        if: failure()
        run: docker compose -f docker-compose.prod.yml logs --tail=100

      - name: Cleanup
        if: always()
        run: docker compose -f docker-compose.prod.yml down -v
