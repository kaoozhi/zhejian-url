upstream read  { server read-service:8080; }
upstream write { server write-service:8081; }

server {
  listen 80;

  # Write operations: POST and DELETE on /api/v1/*
  location /api/v1/ {
    if ($request_method ~ "^(POST|DELETE|PUT)$") {
      proxy_pass http://write;
      break;
    }
    proxy_pass http://read;   # GET /api/v1/urls/:code → read-service
  }

  # Redirects and health → read-service
  location / {
    proxy_pass http://read;
  }
}
