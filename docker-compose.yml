services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${DB_USER:-zhejian}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-zhejian_secret}
      POSTGRES_DB: ${DB_NAME:-urlshortener}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-zhejian} -d ${DB_NAME:-urlshortener}"]
      interval: 10s
      timeout: 5s
      retries: 5

  migrations:
    build: ./migrations
    environment:
      DATABASE_URL: postgres://${DB_USER:-zhejian}:${DB_PASSWORD:-zhejian_secret}@postgres:5432/${DB_NAME:-urlshortener}?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  redis:
    image: redis:8-alpine
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  rate-limiter:
    build:
      context: .
      dockerfile: services/rate-limiter/Dockerfile
    environment:
      REDIS_URL: redis://redis:6379
      GRPC_PORT: "50051"
      RATE_LIMIT: ${RATE_LIMIT:-100}
      BURST: ${BURST:-50}
    expose:
      - "50051"
    depends_on:
      redis:
        condition: service_healthy

  gateway:
    build: ./services/gateway
    environment:
      DB_HOST: ${DB_HOST:-postgres}
      DB_PORT: ${DB_PORT:-5432}
      DB_USER: ${DB_USER:-zhejian}
      DB_PASSWORD: ${DB_PASSWORD:-zhejian_secret}
      DB_NAME: ${DB_NAME:-urlshortener}
      DB_SSLMODE: ${DB_SSLMODE:-disable}
      CACHE_HOST: ${CACHE_HOST:-redis}
      CACHE_PORT: ${CACHE_PORT:-6379}
      CACHE_TTL: ${CACHE_TTL:-5m}
      RATE_LIMITER_ADDR: ${RATE_LIMITER_ADDR-rate-limiter:50051}
      RATE_LIMITER_TIMEOUT: ${RATE_LIMITER_TIMEOUT:-100ms}
      OTEL_EXPORTER_OTLP_ENDPOINT: jaeger:4317
      AMQP_URL: amqp://guest:guest@rabbitmq:5672/
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      migrations:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      rate-limiter:
        condition: service_started
      jaeger:
        condition: service_started
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  # RabbitMQ - Message broker
  rabbitmq:
    image: rabbitmq:4-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Analytics Worker
  analytics-worker:
    build:
      context: ./services/analytics-worker
    env_file: .env
    environment:
      AMQP_URL: amqp://guest:guest@rabbitmq:5672/
    depends_on:
      rabbitmq:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: on-failure

  jaeger:
    image: jaegertracing/all-in-one:1.50
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686" # Jaeger UI
      - "4317:4317"   # OTLP gRPC

  prometheus:
    image: prom/prometheus:v2.47.0
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'
      - '--web.enable-remote-write-receiver'  # required for k6 remote write output
    ports:
      - "9090:9090"
    volumes:
      - ./observability/prometheus/prometheus.dev.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      gateway:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  rabbitmq_data:
